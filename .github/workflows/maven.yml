name: Java CI with Maven

# 1. Kích hoạt workflow khi có sự kiện push và pull_request
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt JDK 17 (Con có thể đổi phiên bản Java tuỳ máy con)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 2. Thực thi vòng đời build của Maven (test và package)
      - name: Build dự án với Maven
        run: mvn -B package --file pom.xml

      # 3. Triển khai action upload-artifact để lưu file .jar
      - name: Lưu trữ file JAR
        uses: actions/upload-artifact@v4
        with:
          name: BankSystem-Artifact
          path: target/*.jar